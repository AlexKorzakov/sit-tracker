<html>
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="popup.css">
    </head>
    <script src="popup.js" defer></script>
    <body>
        <div class="container">
            <form id="timerForm">
                <div class="status">Status:</div>
                <label>
                    <span class="labelInterval">Set time interval (min):</span>
                    <input type="number" id="interval" value="15" min="1" required>
                </label>
                <button type="submit" id="start">Start</button>
                <div class="endTime"></div>
            </form>
        </div>
    </body>
</html>
